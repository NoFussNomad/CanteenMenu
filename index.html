<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Canteen Menu</title> 
  <link rel="stylesheet" href="style.css">
  <script src="script.js"></script>
</head>

<body>

  <div class="phone" id="app-container">

    <div id="header" class="header">
        <div class="qr-icon" onclick="openQRModal()">QR</div> 
        <span id="header-title">Canteen Menu</span>
        <div class="header-spacer"></div>
    </div>

    <div id="admin-bar" class="admin-bar">
        <strong>Admin Dashboard</strong>
        <button class="btn btn-blue" style="margin-left:10px;" onclick="openModal('add-product-modal')">+ Add Product</button>
    </div>

    <div id="top-controls" class="controls-back">
      <div class="search"><input type="text" placeholder=" Search food..."></div>
      <div class="tabs">
        <span class="tab active" onclick="filterMenu(this, 'biscuit')">Biscuits</span>
        <span class="tab" onclick="filterMenu(this, 'junk')">Snacks</span>
        <span class="tab" onclick="filterMenu(this, 'beverage')">Drinks</span>
        <span class="tab" onclick="filterMenu(this, 'rice')">Meals</span>
      </div>
    </div>

    <div class="main-scroll">
      
      <div id="view-menu">
        <div id="menu-container"></div>
      </div>

      <div id="view-cart" class="hidden">
        <h3>My Cart</h3>
        <div id="cart-container"></div>
        <div id="cart-actions" class="hidden">
             <p style="text-align: right; font-weight: bold;">Total: ₱<span id="cart-total">0</span></p>
             <button class="btn btn-add" style="width:100%" onclick="checkout()">Checkout</button>
        </div>
      </div>

      <div id="view-orders" class="hidden">
        <h3>My Orders</h3>
        <div id="student-orders-container"></div>
      </div>
      <div id="view-admin-orders" class="hidden">
        <h3>Incoming Queue</h3>
        <div id="admin-orders-container"></div>
      </div>

      <div id="view-favorite" class="hidden">
        <h3>My Favorites</h3>
        <div id="fav-container"></div>
      </div>

      <div id="view-profile" class="hidden">
        <h3>Profile</h3>
        <div style="background: white; padding: 20px; border-radius: 10px; text-align: center;">
            <div style="width: 80px; height: 80px; background: #ddd; border-radius: 50%; margin: 0 auto 10px;"></div>
            <h2 id="profile-name">Meow Meow Meow</h2>
            <p id="profile-role">Student ID: 911-911-911</p>
            <hr>
            <button id="login-btn" class="btn btn-blue" style="width: 100%;" onclick="openModal('login-modal')">Staff Login</button>
            <button id="logout-btn" class="btn btn-danger hidden" style="width: 100%;" onclick="logoutAdmin()">Admin Logout</button>
        </div>
      </div>

    </div>

    <div class="footer">
      <div class="footer-item active" onclick="nav('menu', this)"><span>Menu</span></div>
      <div class="footer-item student-only" onclick="nav('cart', this)"><span>Cart</span></div>
      <div class="footer-item student-only" onclick="nav('orders', this)"><span>Orders</span></div>
      <div class="footer-item admin-only hidden" onclick="nav('admin-orders', this)"><span>Queue</span></div>
      <div class="footer-item student-only" onclick="nav('favorite', this)"><span>Saved</span></div>
      <div class="footer-item" onclick="nav('profile', this)"><span>Profile</span></div>
    </div>

  </div>

  <div id="qr-modal" class="modal hidden" onclick="closeModal('qr-modal')">
      <div class="modal-content" onclick="event.stopPropagation()">
          <h3>Scan for Menu</h3>
          <div class="qr-display">
             <img id="real-qr-code" src="" alt="Loading QR...">
          </div>
          <p id="qr-link-text" style="font-size: 11px; color:#555; word-break:break-all; margin-top:10px;"></p>
          <button class="btn btn-danger" style="margin-top:10px;" onclick="closeModal('qr-modal')">Close</button>
      </div>
  </div>

  <div id="login-modal" class="modal hidden">
      <div class="modal-content">
          <h3>Staff Login</h3>
          <input type="password" id="admin-pass" placeholder="Enter Password (1234)">
          <div style="display:flex; gap:10px; justify-content:center;">
              <button class="btn btn-add" onclick="attemptLogin()">Login</button>
              <button class="btn btn-danger" onclick="closeModal('login-modal')">Cancel</button>
          </div>
      </div>
  </div>

  <div id="add-product-modal" class="modal hidden">
      <div class="modal-content">
          <h3>Add Product</h3>
          <input type="text" id="new-name" placeholder="Name">
          <input type="number" id="new-price" placeholder="Price">
          <input type="text" id="new-img" placeholder="Image URL (optional)">
          <select id="new-cat">
              <option value="biscuit">Biscuit</option>
              <option value="junk">Snacks</option>
              <option value="beverage">Drinks</option>
              <option value="rice">Meals</option>
          </select>
          <div style="display:flex; gap:10px; justify-content:center;">
              <button class="btn btn-add" onclick="addNewProduct()">Add</button>
              <button class="btn btn-danger" onclick="closeModal('add-product-modal')">Cancel</button>
          </div>
      </div>
  </div>

</body>
</html>
